<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pipe Dream CNC Simulator</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #1a1a2e; color: #e0e0e0; font-family: 'Consolas', 'Courier New', monospace; }
    </style>
    <script type="module" crossorigin src="/cnc-pipe-sim/assets/index-Cz3ZF2ju.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        document.getElementById('root').innerHTML =
          '<pre style="color:#ff6666;padding:32px;white-space:pre-wrap">' +
          'JS Error: ' + msg + '\nSource: ' + src + ':' + line + '\n\n' + (err && err.stack || '') +
          '</pre>';
      };
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('root').innerHTML =
          '<pre style="color:#ff6666;padding:32px;white-space:pre-wrap">' +
          'Unhandled Promise: ' + (e.reason && e.reason.stack || e.reason) +
          '</pre>';
      });
    </script>
  </body>
</html>
